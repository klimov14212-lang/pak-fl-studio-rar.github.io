<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FL Packs Hub — делись своими паками для FL Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🎛️</span>
        <span class="logo-text">FLPacksHub</span>
      </div>
      <button class="add-pack-btn" id="showUploadBtn">
        <span>⬆️</span> Загрузить пак
      </button>
    </header>

    <!-- Сетка с паками -->
    <div id="packsContainer" class="packs-grid">
      <!-- динамически заполняется -->
    </div>

    <!-- Форма добавления -->
    <section class="upload-section" id="uploadSection">
      <div class="upload-title">
        <span>📦</span> Загрузить новый пак для FL Studio
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>🎤 Название пака</label>
          <input type="text" id="packName" placeholder="Например: Trap Essentials Vol.2" autocomplete="off">
        </div>
        <div class="form-group">
          <label>🎵 Жанр / Стиль</label>
          <select id="packGenre">
            <option value="Trap">Trap</option>
            <option value="Hip-Hop">Hip-Hop</option>
            <option value="Lo-Fi">Lo-Fi</option>
            <option value="EDM">EDM</option>
            <option value="R&B">R&B</option>
            <option value="Drill">Drill</option>
            <option value="House">House</option>
            <option value="Reggaeton">Reggaeton</option>
            <option value="Custom">Другое</option>
          </select>
        </div>
        <div class="form-group">
          <label>📝 Краткое описание</label>
          <textarea id="packDesc" placeholder="Что внутри: драм-киты, мелодии, one-shots..."></textarea>
        </div>
      </div>
      <div class="file-upload-area" id="fileDropArea">
        <span style="font-size:2rem;">📂</span>
        <span id="fileLabel">Перетащите файл или нажмите для выбора (ZIP, RAR, 7z)</span>
        <input type="file" id="packFileInput" class="file-input" accept=".zip,.rar,.7z,.flp,.fst,.wav,.mp3,.mid,.dwp,.dwb">
        <div class="progress-bar" id="uploadProgressBar" style="display: none;">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <button class="submit-btn" id="submitPackBtn">
        <span>🚀</span> Опубликовать пак
      </button>
    </section>
    <footer>© FL Packs Hub — делись звуком с сообществом. Все загруженные файлы доступны для скачивания.</footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
